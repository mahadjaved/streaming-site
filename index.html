<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Dashboard</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
        
      body {
          background-color: #0a0a0a; 
          margin: 0;
          font-family: 'Inter', sans-serif;
      }
      
      .stream-dashboard {
          max-width: 960px;
          margin: 0 auto;
          padding: 15px 15px 40px 15px;
          background: #0a0a0a; 
          border-radius: 15px;
      }
      .ambient-glow-wrapper {
          position: relative;
          border-radius: 12px;
          padding: 3px; 
          background: linear-gradient(135deg, rgba(83, 104, 120, 0.3), rgba(17, 17, 17, 0.5));
      }
      .ambient-glow-wrapper::before {
          content: '';
          position: absolute;
          top: -10px;
          left: -10px;
          right: -10px;
          bottom: -10px;
          z-index: -1;
          border-radius: 20px;
          background: linear-gradient(120deg, #1e3a27, #536878, #162a3b, #1b4332);
          background-size: 300% 300%;
          filter: blur(45px) opacity(0.65);
          animation: ambientPulse 12s ease infinite;
          pointer-events: none;
      }

      @keyframes ambientPulse {
          0% { background-position: 0% 50%; filter: blur(45px) opacity(0.6); }
          50% { background-position: 100% 50%; filter: blur(55px) opacity(0.75); }
          100% { background-position: 0% 50%; filter: blur(45px) opacity(0.6); }
      }

      .video-container {
          position: relative;
          padding-bottom: 56.25%;
          height: 0;
          overflow: hidden;
          background: #111111;
          border-radius: 8px;
          box-shadow: 0 10px 40px rgba(0,0,0,0.95);
      }
        
      .video-container iframe {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          border: none;
      }
        
      .controls-container {
          margin-top: 30px;
          background: #111111;
          padding: 20px;
          border-radius: 8px;
          border: 1px solid #222222;
      }
        
      .control-title {
          color: #ff4757;
          font-size: 11px;
          margin: 20px 0 12px 0;
          text-transform: uppercase;
          letter-spacing: 2px;
          font-weight: 800;
          border-bottom: 1px solid #222;
          padding-bottom: 5px;
      }
      .control-title:first-child {
          margin-top: 0;
      }
        
      .button-group {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
          margin-bottom: 10px;
      }
        
      .stream-btn {
          background: #1a1a1a;
          color: #aaaaaa;
          border: 1px solid #333333;
          padding: 12px 20px;
          border-radius: 6px;
          cursor: pointer;
          font-weight: 600;
          font-size: 14px;
          transition: all 0.2s ease-in-out;
          flex: 1 1 calc(20% - 12px);
          min-width: 130px;
          text-align: center;
      }
      .stream-btn:disabled {
          opacity: 0.3;
          cursor: not-allowed;
      }
        
      .stream-btn:hover:not(:disabled) {
          background: #262626;
          color: #ffffff;
          border-color: #666666;
      }
        
      .stream-btn.active {
          background: #536878;
          color: #ffffff;
          border-color: #536878;
          box-shadow: 0 0 12px rgba(167, 196, 188, 0.4);
      }

      .feed-links, .blog-pager, #blog-pager, .post-feeds, .post-title, .entry-title, h1.post-title, .header-outer {
          display: none !important;
          visibility: hidden !important;
          height: 0 !important;
          padding: 0 !important;
          margin: 0 !important;
      }
      
      h2 {
          color: white;
          font-size: 30px;
          padding-left: 40px;
          margin-top: 30px;
      }
        
      p {
          color: #737373;
      }
        
      p.ad-text {
          padding-left: 40px;
          padding-bottom: 10px;
      }
    </style>
</head>
<body>

    <h2>Live Streaming Dashboard</h2>
    <p id="match-status-text">Checking for active matches...</p>
    
    <div class="stream-dashboard">
        
        <div class="ambient-glow-wrapper">
            <div class="video-container">
                <iframe id="live-stream" scrolling="no" frameborder="0" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" src="about:blank"></iframe>
            </div>
        </div>

        <div class="controls-container">
            <p class="control-title">FIFA World Cup 2026 Streams</p>
            <div class="button-group">
                <button id="football-1" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 1 (FHD)</button>
                <button id="football-2" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 2 (FHD)</button>
                <button id="football-3" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 3 (Backup 1)</button>
                <button id="football-4" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 4 (Backup 2)</button>
                <button id="football-5" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 5 (Low Quality)</button>
            </div>

            <p class="control-title">Grand Prix Streams</p>
            <div class="button-group">
                <button id="grand-prix" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Grand Prix (FHD)</button>
            </div>

            <p class="control-title">Cricket Streams</p>
            <div class="button-group">
                <button id="cricket" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 1</button>
            </div>
        </div>
    </div>
    
    <p class="ad-text">For a complete ad-blocking experience, we recommend using Firefox and uBlock Origin add-on.</p>

    <script>
        function switchStream(streamUrl, buttonElement) {
            if(!streamUrl) return;
            const player = document.getElementById('live-stream');
            if (player) {
                player.src = streamUrl;
            }
            
            const buttons = document.querySelectorAll('.stream-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if(buttonElement) {
                buttonElement.classList.add('active');
            }
        }

        const statusText = document.getElementById('match-status-text');

        fetch('https://streamed.pk/api/matches/live')
            .then(res => res.json())
            .then(matches => {
                statusText.innerText = "Streams only work when there's a live active match.";

                const footballMatch = matches.find(m => m.category === 'football');
                if (footballMatch && footballMatch.sources.length > 0) {
                    const source = footballMatch.sources[0];
                    fetch(`https://streamed.pk/api/stream/${source.source}/${source.id}`)
                        .then(res => res.json())
                        .then(streams => {
                            const sorted = streams.sort((a, b) => {
                                if (a.hd !== b.hd) return b.hd - a.hd;
                                if (a.language === 'English' && b.language !== 'English') return -1;
                                return 0;
                            });

                            for (let i = 1; i <= 5; i++) {
                                const btn = document.getElementById(`football-${i}`);
                                const streamData = sorted[i - 1];

                                if (streamData) {
                                    btn.disabled = false;
                                    btn.dataset.url = streamData.embedUrl;
                                    
                                    if (i === 1) {
                                        switchStream(streamData.embedUrl, btn);
                                    }
                                } else {
                                    btn.innerText = `Stream ${i} (Offline)`;
                                }
                            }
                        });
                }

                const f1Match = matches.find(m => m.category === 'f1' || m.category === 'formula1' || m.title.toLowerCase().includes('grand prix'));
                if (f1Match && f1Match.sources.length > 0) {
                    fetch(`https://streamed.pk/api/stream/${f1Match.sources[0].source}/${f1Match.sources[0].id}`)
                        .then(res => res.json())
                        .then(streams => {
                            if (streams.length > 0) {
                                const btn = document.getElementById('grand-prix');
                                btn.disabled = false;
                                btn.dataset.url = streams[0].embedUrl;
                                
                                if (!document.getElementById('live-stream').src || document.getElementById('live-stream').src === window.location.href + "about:blank") {
                                    switchStream(streams[0].embedUrl, btn);
                                }
                            }
                        });
                }

                const cricketMatch = matches.find(m => m.category === 'cricket' || m.title.toLowerCase().includes('pakw') || m.title.toLowerCase().includes('indw'));
                if (cricketMatch && cricketMatch.sources.length > 0) {
                    fetch(`https://streamed.pk/api/stream/${cricketMatch.sources[0].source}/${cricketMatch.sources[0].id}`)
                        .then(res => res.json())
                        .then(streams => {
                            if (streams.length > 0) {
                                const btn = document.getElementById('cricket');
                                btn.disabled = false;
                                btn.dataset.url = streams[0].embedUrl;
                            }
                        });
                }
            })
            .catch(err => {
                console.error("API error:", err);
                statusText.innerText = "Error syncing stream feeds. Using hardcoded backups.";
            });
    </script>
    
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
