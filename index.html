<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Dashboard</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
        
      body {
          background-color: #0a0a0a; 
          margin: 0;
          font-family: 'Inter', sans-serif;
      }
      
      .stream-dashboard {
          max-width: 960px;
          margin: 0 auto;
          padding: 15px 15px 40px 15px;
          background: #0a0a0a; 
          border-radius: 15px;
      }
      .ambient-glow-wrapper {
          position: relative;
          border-radius: 12px;
          padding: 3px; 
          background: linear-gradient(135deg, rgba(83, 104, 120, 0.3), rgba(17, 17, 17, 0.5));
      }
      .ambient-glow-wrapper::before {
          content: '';
          position: absolute;
          top: -10px;
          left: -10px;
          right: -10px;
          bottom: -10px;
          z-index: -1;
          border-radius: 20px;
          background: linear-gradient(120deg, #1e3a27, #536878, #162a3b, #1b4332);
          background-size: 300% 300%;
          filter: blur(45px) opacity(0.65);
          animation: ambientPulse 12s ease infinite;
          pointer-events: none;
      }

      @keyframes ambientPulse {
          0% { background-position: 0% 50%; filter: blur(45px) opacity(0.6); }
          50% { background-position: 100% 50%; filter: blur(55px) opacity(0.75); }
          100% { background-position: 0% 50%; filter: blur(45px) opacity(0.6); }
      }

      .video-container {
          position: relative;
          padding-bottom: 56.25%;
          height: 0;
          overflow: hidden;
          background: #111111;
          border-radius: 8px;
          box-shadow: 0 10px 40px rgba(0,0,0,0.95);
      }
        
      .video-container iframe {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          border: none;
      }
        
      .controls-container {
          margin-top: 30px;
          background: #111111;
          padding: 20px;
          border-radius: 8px;
          border: 1px solid #222222;
      }
        
      .control-title {
          color: #ff4757;
          font-size: 11px;
          margin: 20px 0 6px 0;
          text-transform: uppercase;
          letter-spacing: 2px;
          font-weight: 800;
      }
      .control-title:first-child {
          margin-top: 0;
      }

      .match-subtitle {
          color: #666666;
          font-size: 13px;
          margin: 0 0 12px 0;
          padding-bottom: 8px;
          border-bottom: 1px solid #222;
          font-weight: 500;
          display: flex;
          align-items: center;
          gap: 8px;
      }

      .match-select {
          background: #1a1a1a;
          color: #aaaaaa;
          border: 1px solid #333333;
          padding: 4px 10px;
          border-radius: 4px;
          font-family: 'Inter', sans-serif;
          font-size: 12px;
          font-weight: 600;
          cursor: pointer;
          outline: none;
          max-width: 300px;
      }
      .match-select:focus {
          border-color: #536878;
          color: white;
      }
        
      .button-group {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
          margin-bottom: 20px;
      }
      .button-group:last-child {
          margin-bottom: 10px;
      }
        
      .stream-btn {
          background: #1a1a1a;
          color: #aaaaaa;
          border: 1px solid #333333;
          padding: 12px 20px;
          border-radius: 6px;
          cursor: pointer;
          font-weight: 600;
          font-size: 14px;
          transition: all 0.2s ease-in-out;
          flex: 1 1 calc(20% - 12px);
          min-width: 130px;
          text-align: center;
      }
      .stream-btn:disabled {
          opacity: 0.3;
          cursor: not-allowed;
      }
        
      .stream-btn:hover:not(:disabled) {
          background: #262626;
          color: #ffffff;
          border-color: #666666;
      }
        
      .stream-btn.active {
          background: #536878;
          color: #ffffff;
          border-color: #536878;
          box-shadow: 0 0 12px rgba(167, 196, 188, 0.4);
      }

      .feed-links, .blog-pager, #blog-pager, .post-feeds, .post-title, .entry-title, h1.post-title, .header-outer {
          display: none !important;
          visibility: hidden !important;
          height: 0 !important;
          padding: 0 !important;
          margin: 0 !important;
      }
      
      h2 {
          color: white;
          font-size: 30px;
          padding-left: 40px;
          margin-top: 30px;
      }
        
      p.text {
          color: #737373;
          padding-left: 40px;
          padding-bottom: 10px;
      }
      
      .no-matches-msg {
          color: #444444;
          font-size: 13px;
          font-style: italic;
          padding: 5px 0;
      }
    </style>
</head>
<body>

    <h2>Live Streaming Dashboard</h2>
    <p class="text" id="match-status-text">Checking for active matches...</p>
    
    <div class="stream-dashboard">
        
        <div class="ambient-glow-wrapper">
            <div class="video-container">
                <iframe id="live-stream" scrolling="no" frameborder="0" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" src="about:blank"></iframe>
            </div>
        </div>

        <div class="controls-container">
            <p class="control-title">Football Streams</p>
            <div class="match-subtitle">
                <span>Matches:</span>
                <select id="football-select" class="match-select" onchange="updateMultiStreams('football', 5)">
                    <option value="">No active matches detected.</option>
                </select>
            </div>
            <div class="button-group">
                <button id="football-1" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 1 (FHD)</button>
                <button id="football-2" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 2 (FHD)</button>
                <button id="football-3" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 3 (Backup 1)</button>
                <button id="football-4" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 4 (Backup 2)</button>
                <button id="football-5" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 5 (Low Quality)</button>
            </div>

            <p class="control-title">Grand Prix Streams</p>
            <div class="match-subtitle" style="border: none; margin-bottom: 4px; padding: 0;"></div>
            <div id="f1-container" class="button-group">
                <div class="no-matches-msg">No active races detected.</div>
            </div>

            <p class="control-title">Cricket Streams</p>
            <div class="match-subtitle">
                <span>Matches:</span>
                <select id="cricket-select" class="match-select" onchange="updateMultiStreams('cricket', 3)">
                    <option value="">No active cricket matches detected.</option>
                </select>
            </div>
            <div class="button-group">
                <button id="cricket-1" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 1 (HD)</button>
                <button id="cricket-2" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 2 (Backup)</button>
                <button id="cricket-3" class="stream-btn" disabled onclick="switchStream(this.dataset.url, this)">Stream 3 (Low Quality)</button>
            </div>
        </div>
    </div>
    
    <p class="text">For a complete ad-blocking experience, we recommend using Firefox and uBlock Origin add-on.</p>

    <script>
        let matchStreamsCache = {};

        function switchStream(streamUrl, buttonElement) {
            if(!streamUrl) return;
            const player = document.getElementById('live-stream');
            if (player) {
                player.src = streamUrl;
            }
            
            if (buttonElement) {
                const parentGroup = buttonElement.parentElement;
                if (parentGroup) {
                    const siblingButtons = parentGroup.querySelectorAll('.stream-btn');
                    siblingButtons.forEach(btn => btn.classList.remove('active'));
                }
                buttonElement.add('active');
            }
        }

        function updateMultiStreams(sectionType, maxButtons, forceAutoplay = false) {
            const selectEl = document.getElementById(`${sectionType}-select`);
            if (!selectEl) return;
            const combinedKey = selectEl.value;
            
            if (!combinedKey || !matchStreamsCache[combinedKey]) {
                for (let i = 1; i <= maxButtons; i++) {
                    const btn = document.getElementById(`${sectionType}-${i}`);
                    if (btn) {
                        btn.disabled = true;
                        btn.dataset.url = '';
                        btn.innerText = `Stream ${i} (Offline)`;
                        btn.classList.remove('active');
                    }
                }
                return;
            }

            const sortedStreams = matchStreamsCache[combinedKey];
            
            for (let i = 1; i <= maxButtons; i++) {
                const btn = document.getElementById(`${sectionType}-${i}`);
                if (!btn) continue;
                
                const streamData = sortedStreams[i - 1];

                if (streamData) {
                    btn.disabled = false;
                    btn.dataset.url = streamData.embedUrl;
                    
                    let langSuffix = "";
                    if (streamData.language && streamData.language !== "Unknown" && streamData.language !== "English") {
                        langSuffix = ` (${streamData.language})`;
                    }

                    if (sectionType === 'football') {
                        btn.innerText = i <= 2 ? `Stream ${i} (FHD)${langSuffix}` : i <= 4 ? `Stream ${i} (Backup ${i-2})${langSuffix}` : `Stream ${i} (Low Quality)${langSuffix}`;
                    } else {
                        btn.innerText = i === 1 ? `Stream 1 (HD)${langSuffix}` : i === 2 ? `Stream 2 (Backup)${langSuffix}` : `Stream 3 (Low Quality)${langSuffix}`;
                    }
                } else {
                    btn.disabled = true;
                    btn.dataset.url = '';
                    btn.innerText = `Stream ${i} (Offline)`;
                    btn.classList.remove('active');
                }
            }

            const currentPlayerSrc = document.getElementById('live-stream').src;
            const isPlayerEmpty = !currentPlayerSrc || currentPlayerSrc === window.location.href + "about:blank";

            if (forceAutoplay || isPlayerEmpty) {
                const firstActiveBtn = document.getElementById(`${sectionType}-1`);
                if (firstActiveBtn && !firstActiveBtn.disabled) {
                    switchStream(firstActiveBtn.dataset.url, firstActiveBtn);
                }
            }
        }

        const statusText = document.getElementById('match-status-text');

        fetch('https://streamed.pk/api/matches/live')
            .then(res => res.json())
            .then(matches => {
                statusText.innerText = "Streams only work when there's a live active match.";

                const footballMatches = [];
                const f1Matches = [];
                const cricketMatches = [];

                matches.forEach(m => {
                    const titleLower = m.title.toLowerCase();
                    const catLower = (m.category || '').toLowerCase();

                    if (catLower === 'f1' || catLower === 'formula1' || titleLower.includes('grand prix') || titleLower.includes('formula 1')) {
                        f1Matches.push(m);
                    } else if (catLower === 'cricket' || titleLower.includes('pakw') || titleLower.includes('indw') || titleLower.includes('cricket') || titleLower.includes('t20')) {
                        cricketMatches.push(m);
                    } else {
                        footballMatches.push(m);
                    }
                });

                function processDropdownSection(matchList, selectId, sectionType, maxButtons) {
                    const selectEl = document.getElementById(selectId);
                    if (!selectEl || matchList.length === 0) return;

                    selectEl.innerHTML = '';
                    
                    const groupedMatches = {};
                    const orderTracking = [];

                    matchList.forEach(match => {
                        const normalizedTitle = match.title
                            .toLowerCase()
                            .normalize("NFD")
                            .replace(/[\u0300-\u036f]/g, "")
                            .replace(/\s*\(.*?\)\s*/g, "")
                            .trim();

                        if (!groupedMatches[normalizedTitle]) {
                            groupedMatches[normalizedTitle] = {
                                title: match.title.replace(/\s*\(.*?\)\s*/g, "").trim(),
                                sources: []
                            };
                            orderTracking.push(normalizedTitle);
                        }
                        
                        if (match.sources && match.sources.length > 0) {
                            match.sources.forEach(src => {
                                groupedMatches[normalizedTitle].sources.push(src);
                            });
                        }
                    });

                    orderTracking.forEach(key => {
                        const group = groupedMatches[key];
                        const option = document.createElement('option');
                        option.value = key;
                        option.innerText = group.title;
                        selectEl.appendChild(option);
                    });

                    const firstKey = orderTracking[0];

                    orderTracking.forEach(key => {
                        const group = groupedMatches[key];
                        const fetchPromises = group.sources.map(source => 
                            fetch(`https://streamed.pk/api/stream/${source.source}/${source.id}`)
                                .then(res => res.json())
                                .catch(() => [])
                        );

                        Promise.all(fetchPromises).then(results => {
                            let allStreams = [].concat(...results);

                            allStreams = allStreams.filter((stream, index, self) =>
                                index === self.findIndex((s) => s.embedUrl === stream.embedUrl)
                            );

                            allStreams.sort((a, b) => {
                                const aLang = a.language || '';
                                const bLang = b.language || '';
                                if (aLang === 'English' && bLang !== 'English') return -1;
                                if (bLang === 'English' && aLang !== 'English') return 1;
                                if (a.hd !== b.hd) return b.hd - a.hd;
                                return 0;
                            });

                            matchStreamsCache[key] = allStreams;

                            if (key === firstKey) {
                                updateMultiStreams(sectionType, maxButtons, true);
                            }
                        });
                    });
                }

                processDropdownSection(footballMatches, 'football-select', 'football', 5);
                processDropdownSection(cricketMatches, 'cricket-select', 'cricket', 3);

                if (f1Matches.length > 0) {
                    const container = document.getElementById('f1-container');
                    container.innerHTML = ''; 

                    f1Matches.forEach((match) => {
                        if (match.sources && match.sources.length > 0) {
                            const fetchPromises = match.sources.map(source =>
                                fetch(`https://streamed.pk/api/stream/${source.source}/${source.id}`)
                                    .then(res => res.json())
                                    .catch(() => [])
                            );

                            Promise.all(fetchPromises).then(results => {
                                let allStreams = [].concat(...results);

                                allStreams = allStreams.filter((stream, index, self) =>
                                    index === self.findIndex((s) => s.embedUrl === stream.embedUrl)
                                );

                                if (allStreams.length > 0) {
                                    const sorted = allStreams.sort((a, b) => {
                                        if (a.hd !== b.hd) return b.hd - a.hd;
                                        if (a.language === 'English' && b.language !== 'English') return -1;
                                        return 0;
                                    });

                                    sorted.forEach((stream, index) => {
                                        const btn = document.createElement('button');
                                        btn.className = 'stream-btn';
                                        btn.dataset.url = stream.embedUrl;
                                        
                                        let label = "Stream " + (index + 1);
                                        if (stream.name && stream.name.trim() !== "") {
                                            label = stream.name;
                                        } else if (stream.language && stream.language !== "Unknown") {
                                            label = stream.language;
                                        }

                                        if (index === sorted.length - 1 && sorted.length > 1) {
                                            btn.innerText = "Low Quality Stream";
                                        } else {
                                            btn.innerText = label;
                                        }

                                        btn.onclick = () => switchStream(stream.embedUrl, btn);
                                        container.appendChild(btn);

                                        if (index === 0 && (!document.getElementById('live-stream').src || document.getElementById('live-stream').src === window.location.href + "about:blank")) {
                                            switchStream(stream.embedUrl, btn);
                                        }
                                    });
                                }
                            });
                        }
                    });
                }
            })
            .catch(err => {
                console.error("API error:", err);
                statusText.innerText = "Error
