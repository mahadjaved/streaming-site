<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Dashboard</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
        
      body {
          background-color: #0a0a0a; 
          margin: 0;
          font-family: 'Inter', sans-serif;
      }
      
      .stream-dashboard {
          max-width: 960px;
          margin: 0 auto;
          padding: 15px 15px 40px 15px;
          background: #0a0a0a; 
          border-radius: 15px;
      }
      .ambient-glow-wrapper {
          position: relative;
          border-radius: 12px;
          padding: 3px; 
          background: linear-gradient(135deg, rgba(83, 104, 120, 0.3), rgba(17, 17, 17, 0.5));
      }
      .ambient-glow-wrapper::before {
          content: '';
          position: absolute;
          top: -10px;
          left: -10px;
          right: -10px;
          bottom: -10px;
          z-index: -1;
          border-radius: 20px;
          background: linear-gradient(120deg, #1e3a27, #536878, #162a3b, #1b4332);
          background-size: 300% 300%;
          filter: blur(45px) opacity(0.65);
          animation: ambientPulse 12s ease infinite;
          pointer-events: none;
      }

      @keyframes ambientPulse {
          0% { background-position: 0% 50%; filter: blur(45px) opacity(0.6); }
          50% { background-position: 100% 50%; filter: blur(55px) opacity(0.75); }
          100% { background-position: 0% 50%; filter: blur(45px) opacity(0.6); }
      }

      .video-container {
          position: relative;
          padding-bottom: 56.25%;
          height: 0;
          overflow: hidden;
          background: #111111;
          border-radius: 8px;
          box-shadow: 0 10px 40px rgba(0,0,0,0.95);
      }
        
      .video-container iframe {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          border: none;
      }
        
      .controls-container {
          margin-top: 30px;
          background: #111111;
          padding: 20px;
          border-radius: 8px;
          border: 1px solid #222222;
      }
        
      .control-title {
          color: #ff4757;
          font-size: 11px;
          margin: 20px 0 6px 0;
          text-transform: uppercase;
          letter-spacing: 2px;
          font-weight: 800;
      }
      .control-title:first-child {
          margin-top: 0;
      }

      .match-subtitle {
          color: #666666;
          font-size: 13px;
          margin: 0 0 12px 0;
          padding-bottom: 8px;
          border-bottom: 1px solid #222;
          font-weight: 500;
          display: flex;
          align-items: center;
          gap: 8px;
      }

      .match-select {
          background: #1a1a1a;
          color: #aaaaaa;
          border: 1px solid #333333;
          padding: 4px 10px;
          border-radius: 4px;
          font-family: 'Inter', sans-serif;
          font-size: 12px;
          font-weight: 600;
          cursor: pointer;
          outline: none;
          max-width: 300px;
      }
      .match-select:focus {
          border-color: #536878;
          color: white;
      }
        
      .button-group {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
          margin-bottom: 20px;
      }
      .button-group:last-child {
          margin-bottom: 10px;
      }
        
      .stream-btn {
          background: #1a1a1a;
          color: #aaaaaa;
          border: 1px solid #333333;
          padding: 12px 20px;
          border-radius: 6px;
          cursor: pointer;
          font-weight: 600;
          font-size: 14px;
          transition: all 0.2s ease-in-out;
          flex: 1 1 calc(20% - 12px);
          min-width: 130px;
          text-align: center;
      }
      .stream-btn:disabled {
          opacity: 0.3;
          cursor: not-allowed;
      }
        
      .stream-btn:hover:not(:disabled) {
          background: #262626;
          color: #ffffff;
          border-color: #666666;
      }

          background: #536878;
          color: #ffffff;
          border-color: #536878;
          box-shadow: 0 0 12px
