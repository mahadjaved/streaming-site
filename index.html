<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Dashboard</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
        
      .body {
          font-family: Inter;
      }
      
      .stream-dashboard {
          max-width: 960px;
          margin: 0 auto;
          padding: 15px 15px 40px 15px;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          background: #0a0a0a; 
          border-radius: 15px;
      }
      .ambient-glow-wrapper {
          position: relative;
          border-radius: 12px;
          padding: 3px; 
          background: linear-gradient(135deg, rgba(83, 104, 120, 0.3), rgba(17, 17, 17, 0.5));
      }
      .ambient-glow-wrapper::before {
          content: '';
          position: absolute;
          top: -10px;
          left: -10px;
          right: -10px;
          bottom: -10px;
          z-index: -1;
          border-radius: 20px;
          background: linear-gradient(120deg, #1e3a27, #536878, #162a3b, #1b4332);
          background-size: 300% 300%;
          filter: blur(45px) opacity(0.65);
          animation: ambientPulse 12s ease infinite;
          pointer-events: none;
      }

      @keyframes ambientPulse {
          0% { background-position: 0% 50%; filter: blur(45px) opacity(0.6); }
          50% { background-position: 100% 50%; filter: blur(55px) opacity(0.75); }
          100% { background-position: 0% 50%; filter: blur(45px) opacity(0.6); }
      }

      .video-container {
          position: relative;
          padding-bottom: 56.25%;
          height: 0;
          overflow: hidden;
          background: #111111;
          border-radius: 8px;
          box-shadow: 0 10px 40px rgba(0,0,0,0.95);
      }
        
      .video-container iframe {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          border: none;
      }
        
      .controls-container {
          margin-top: 30px;
          background: #111111;
          padding: 20px;
          border-radius: 8px;
          border: 1px solid #222222;
      }
        
      .control-title {
          color: #666666;
          font-size: 13px;
          margin: 0 0 12px 0;
          text-transform: uppercase;
          letter-spacing: 1.5px;
          font-weight: 700;
      }
        
      .button-group {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
      }
        
      .stream-btn {
          background: #1a1a1a;
          color: #aaaaaa;
          border: 1px solid #333333;
          padding: 12px 20px;
          border-radius: 6px;
          cursor: pointer;
          font-weight: 600;
          font-size: 14px;
          transition: all 0.2s ease-in-out;
          flex: 1 1 calc(20% - 12px);
          min-width: 130px;
      }
        
      .stream-btn:hover {
          background: #262626;
          color: #ffffff;
          border-color: #666666;
      }
        
      .stream-btn.active {
          background: #536878;
          color: #ffffff;
          border-color: #536878;
          box-shadow: 0 0 12px rgba(167, 196, 188, 0.4);
      }

      .feed-links, 
      .blog-pager, 
      #blog-pager,
      .post-feeds,
      .post-title,      
      .entry-title,    
      h1.post-title,   
      .header-outer {
          display: none !important;
          visibility: hidden !important;
          height: 0 !important;
          padding: 0 !important;
          margin: 0 !important;
      }
      
      h2 {
          font-family: Inter;
          color: white;
          font-size: 30px;
          padding-left: 40px;
          margin-top: 30px;
      }
      p {
          font-family: Inter;
          color: #737373;
          padding-left: 40px;
          padding-bottom: 10px;
    </style>
</head>
<body style="background-color: #0a0a0a; margin: 0;">
  <h2>Live Streaming Dashboard</h2>
    <p>Streams only work when there's a live active match.</p>
    <div class="stream-dashboard">
        
        <div class="ambient-glow-wrapper">
            <div class="video-container">
                <iframe id="live-stream" 
                        src="https://embed.st/embed/admin/ppv-qatar-vs-switzerland/3" 
                        scrolling="no" 
                        frameborder="0" 
                        allowfullscreen="true" 
                        webkitallowfullscreen="true" 
                        mozallowfullscreen="true">
                </iframe>
            </div>
        </div>

        <div class="controls-container">
            <p class="control-title">Select Live Stream Source:</p>
            <div class="button-group">
                <button class="stream-btn active" onclick="switchStream('https://embed.st/embed/admin/ppv-qatar-vs-switzerland/3', this)">Stream 1 (Fox)</button>
                <button class="stream-btn" onclick="switchStream('https://embed.st/embed/admin/ppv-qatar-vs-switzerland/1', this)">Stream 2 (ITV1)</button>
                <button class="stream-btn" onclick="switchStream('https://embed.st/embed/delta/live_world-championship-gr-b_qatar-switzerland-live-streaming-1243362393/1', this)">Stream 3 (Backup 1)</button>
                <button class="stream-btn" onclick="switchStream('https://embed.st/embed/delta/live_world-championship-gr-b_qatar-switzerland-live-streaming-1243362393/2', this)">Stream 4 (Backup 2)</button>
                <button class="stream-btn" onclick="switchStream('https://embed.st/embed/admin/ppv-qatar-vs-switzerland/4', this)">Stream 5 (Backup 3)</button>
                <button class="stream-btn" onclick="switchStream('https://embed.st/embed/admin/ppv-barcelona-grand-prix-qualifying/3', this)">Grand Prix (Apple TV)</button>
            </div>
        </div>
    </div>
    <p>For a complete ad-blocking experience, we recommend using Firefox and uBlock Origin add-on.</p>
    <script>
        function switchStream(streamUrl, buttonElement) {
            const player = document.getElementById('live-stream');
            if (player) {
                player.src = streamUrl;
            }
            
            const buttons = document.querySelectorAll('.stream-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            buttonElement.classList.add('active');
        }
    </script>
	<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
